<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{

margin:0;

background:#EFEFEF;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.viewer{

width:min(90vw,900px);

aspect-ratio:1;

background:#D8D8D8;

border-radius:20px;

overflow:hidden;

}

model-viewer{

width:100%;

height:100%;

}

</style>

</head>

<body>

<div class="viewer">

<model-viewer

src="models/briefcase.gllb"

camera-controls

auto-rotate

shadow-intensity="1"

touch-action="pan-y"

environment-image="neutral"

exposure="1">

</model-viewer>

</div>

</body>

</html>
